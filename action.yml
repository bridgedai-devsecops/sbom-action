name: 'BridgedAI SBOM'
description: 'Generate an SBOM using Syft (production) or a clearly marked mock SBOM (mock mode).'
branding:
  icon: 'book'
  color: 'purple'
inputs:
  subject:
    description: 'Subject to scan (directory path or OCI reference).'
    required: true
  subject-type:
    description: 'oci | file (directory path) | npm | binary — Syft integration primarily supports directory and OCI.'
    required: true
  format:
    description: 'spdx-json | cyclonedx-json'
    required: true
  output-file:
    description: 'Where to write the SBOM JSON file.'
    required: true
  mode:
    description: 'production (default) or mock (tests only).'
    required: false
    default: 'production'
  fail-on-error:
    description: 'Fail the step if SBOM generation fails (production default true).'
    required: false
    default: 'true'
outputs:
  sbom-file:
    description: 'Path to SBOM file.'
  sbom-digest:
    description: 'SHA-256 digest of SBOM file (hex).'
  package-count:
    description: 'Approximate package count (when available).'
  format:
    description: 'Echoed SBOM format.'
runs:
  using: 'node20'
  main: 'dist/index.js'
