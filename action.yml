name: 'BridgedAI SBOM'
description: 'Generate an SBOM using Syft (production) or a clearly marked mock SBOM (mock mode).'
author: 'BridgedAI'
branding:
  icon: 'book'
  color: 'purple'
inputs:
  subject:
    description: 'Subject to scan (directory path or OCI reference).'
    required: true
  subject-type:
    description: 'oci | file (directory path) | npm | binary — Syft integration primarily supports directory and OCI.'
    required: true
  format:
    description: 'spdx-json (default) | cyclonedx-json'
    required: false
    default: 'spdx-json'
  output-file:
    description: 'Where to write the SBOM JSON file.'
    required: true
  mode:
    description: 'production (default) or mock (tests only).'
    required: false
    default: 'production'
  fail-on-error:
    description: 'Fail the step if SBOM generation fails (production default true).'
    required: false
    default: 'true'
  syft-path:
    description: 'Optional path to an existing syft binary (skips auto-install).'
    required: false
  syft-version:
    description: 'Syft release to install when missing (e.g. v1.19.0). Default v1.19.0.'
    required: false
    default: 'v1.19.0'
  install-syft:
    description: 'When true (default), download Syft if not on PATH.'
    required: false
    default: 'true'
  organization-id:
    description: 'BridgedAI organization id for signal envelopes (optional).'
    required: false
  emit-demo-signals:
    description: 'When true, tag emitted signals with dataSource=demo. Use false for staging/production E2E.'
    required: false
    default: 'false'
outputs:
  sbom-file:
    description: 'Path to SBOM file.'
  sbom-digest:
    description: 'SHA-256 digest of SBOM file (hex).'
  package-count:
    description: 'Approximate package count (when available).'
  format:
    description: 'Echoed SBOM format.'
runs:
  using: 'node20'
  main: 'dist/index.js'
